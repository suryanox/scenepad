<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>scenepad — support escalation</title>
<style>
  body { margin: 0; padding: 40px 24px; background: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .scene { max-width: 680px; margin: 0 auto; }
  .meta { font-size: 10px; color: #888; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px; font-family: monospace; }
</style>
</head>
<body>
<div class="scene">
  <div class="meta">scenepad / support-escalation</div>
  <svg width="100%" viewBox="0 0 680 300" role="img">
    <title>Support escalation scene</title>
    <desc>Customer reports broken app to support agent, who escalates to engineer, who deploys a fix</desc>
    <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- Panel 1 -->
    <rect x="20" y="20" width="198" height="240" rx="6" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="119" y="40" text-anchor="middle" font-size="10" font-family="monospace" fill="#888" letter-spacing="1">01</text>

    <!-- Customer figure -->
    <circle cx="80" cy="86" r="16" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="80" y1="102" x2="80" y2="152" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="80" y1="116" x2="58" y2="136" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="80" y1="116" x2="96" y2="124" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="80" y1="152" x2="64" y2="182" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="80" y1="152" x2="96" y2="182" stroke="#1a1a1a" stroke-width="2"/>
    <!-- worried face -->
    <circle cx="74" cy="83" r="2" fill="#1a1a1a"/>
    <circle cx="86" cy="83" r="2" fill="#1a1a1a"/>
    <path d="M74 93 Q80 89 86 93" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    <!-- inverted bubble (peak moment) -->
    <rect x="96" y="52" width="108" height="42" rx="8" fill="#1a1a1a"/>
    <polygon points="100,80 90,88 106,88" fill="#1a1a1a"/>
    <polygon points="101,80 90,88 107,87" fill="#1a1a1a"/>
    <text x="150" y="70" text-anchor="middle" font-size="11" fill="#fff">App is broken!</text>
    <text x="150" y="86" text-anchor="middle" font-size="10" fill="#ccc">Can't login since 9am</text>
    <!-- label -->
    <text x="80" y="200" text-anchor="middle" font-size="10" fill="#888">Customer</text>

    <!-- Panel 2 -->
    <rect x="230" y="20" width="198" height="240" rx="6" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="329" y="40" text-anchor="middle" font-size="10" font-family="monospace" fill="#888" letter-spacing="1">02</text>

    <!-- Support figure with headset -->
    <circle cx="280" cy="86" r="16" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M264 86 Q264 70 280 70 Q296 70 296 86" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="259" y="84" width="6" height="9" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="295" y="84" width="6" height="9" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="280" y1="102" x2="280" y2="152" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="280" y1="116" x2="258" y2="136" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="280" y1="116" x2="302" y2="128" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="280" y1="152" x2="264" y2="182" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="280" y1="152" x2="296" y2="182" stroke="#1a1a1a" stroke-width="2"/>
    <!-- focused face -->
    <circle cx="274" cy="83" r="2" fill="#1a1a1a"/>
    <circle cx="286" cy="83" r="2" fill="#1a1a1a"/>
    <line x1="272" y1="92" x2="288" y2="92" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    <!-- bubble -->
    <rect x="238" y="160" width="164" height="38" rx="8" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
    <polygon points="280,160 272,152 288,152" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
    <polygon points="280,161 273,153 287,153" fill="#fff" stroke="#fff" stroke-width="1"/>
    <text x="320" y="177" text-anchor="middle" font-size="11" fill="#1a1a1a">Need eng help —</text>
    <text x="320" y="191" text-anchor="middle" font-size="11" fill="#1a1a1a">auth service down</text>
    <!-- label -->
    <text x="280" y="200" text-anchor="middle" font-size="10" fill="#888">Support</text>

    <!-- Panel 3 -->
    <rect x="440" y="20" width="220" height="240" rx="6" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="550" y="40" text-anchor="middle" font-size="10" font-family="monospace" fill="#888" letter-spacing="1">03</text>

    <!-- Engineer with laptop -->
    <circle cx="490" cy="86" r="16" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <!-- hard hat -->
    <path d="M474 86 Q476 72 490 72 Q504 72 506 86" fill="#1a1a1a"/>
    <line x1="471" y1="87" x2="509" y2="87" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="490" y1="102" x2="490" y2="152" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="490" y1="116" x2="470" y2="132" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="490" y1="116" x2="508" y2="132" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="490" y1="152" x2="474" y2="182" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="490" y1="152" x2="506" y2="182" stroke="#1a1a1a" stroke-width="2"/>
    <!-- determined face -->
    <circle cx="484" cy="83" r="2" fill="#1a1a1a"/>
    <circle cx="496" cy="83" r="2" fill="#1a1a1a"/>
    <path d="M483 93 Q490 97 497 93" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    <!-- laptop in arms -->
    <rect x="468" y="132" width="44" height="28" rx="3" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="464" y1="160" x2="516" y2="160" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- deploy text on laptop -->
    <text x="490" y="148" text-anchor="middle" font-size="8" font-family="monospace" fill="#1a1a1a">deploy</text>
    <!-- bubble -->
    <rect x="514" y="62" width="120" height="42" rx="8" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
    <polygon points="516,80 508,76 508,84" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
    <polygon points="517,80 509,77 509,83" fill="#fff" stroke="#fff" stroke-width="1"/>
    <text x="574" y="79" text-anchor="middle" font-size="11" fill="#1a1a1a">Fixed in 4 min.</text>
    <text x="574" y="95" text-anchor="middle" font-size="10" fill="#888">hotfix deployed</text>
    <!-- label -->
    <text x="490" y="200" text-anchor="middle" font-size="10" fill="#888">Engineer</text>

    <!-- Arrows between panels -->
    <line x1="220" y1="150" x2="228" y2="150" stroke="#1a1a1a" stroke-width="1" marker-end="url(#arr)"/>
    <line x1="430" y1="150" x2="438" y2="150" stroke="#1a1a1a" stroke-width="1" marker-end="url(#arr)"/>

    <!-- Caption -->
    <text x="340" y="285" text-anchor="middle" font-size="13" font-weight="500" fill="#1a1a1a">
      Customer reports outage → support escalates → engineer hotfixes
    </text>
  </svg>
</div>
</body>
</html>
