<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>scenepad — team decision</title>
<style>
  body { margin: 0; padding: 40px 24px; background: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .scene { max-width: 680px; margin: 0 auto; }
  .meta { font-size: 10px; color: #888; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px; font-family: monospace; }
</style>
</head>
<body>
<div class="scene">
  <div class="meta">scenepad / team-decision</div>
  <svg width="100%" viewBox="0 0 680 580" role="img">
    <title>Team decision scene</title>
    <desc>PM wants feature by Friday, engineer pushes back saying 3 weeks, they compromise on Tuesday</desc>
    <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- Panel 1: PM proposes -->
    <rect x="20" y="20" width="314" height="240" rx="6" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="177" y="40" text-anchor="middle" font-size="10" font-family="monospace" fill="#888" letter-spacing="1">01</text>

    <!-- PM figure (pointing) -->
    <circle cx="110" cy="90" r="16" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="104" cy="87" r="2" fill="#1a1a1a"/>
    <circle cx="116" cy="87" r="2" fill="#1a1a1a"/>
    <path d="M104 98 Q110 103 116 98" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    <!-- crown for PM -->
    <path d="M96 80 L96 72 L110 78 L124 72 L124 80 Z" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="110" y1="106" x2="110" y2="156" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="110" y1="120" x2="88" y2="140" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="110" y1="120" x2="140" y2="104" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="110" y1="156" x2="94" y2="186" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="110" y1="156" x2="126" y2="186" stroke="#1a1a1a" stroke-width="2"/>
    <text x="110" y="208" text-anchor="middle" font-size="10" fill="#888">PM</text>

    <!-- PM bubble -->
    <rect x="136" y="56" width="172" height="42" rx="8" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
    <polygon points="138,74 130,80 144,80" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
    <polygon points="139,74 131,80 145,79" fill="#fff" stroke="#fff" stroke-width="1"/>
    <text x="222" y="74" text-anchor="middle" font-size="11" fill="#1a1a1a">Ship it by Friday.</text>
    <text x="222" y="90" text-anchor="middle" font-size="10" fill="#888">Investors are waiting.</text>

    <!-- Engineer figure (arms out) -->
    <circle cx="260" cy="90" r="16" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="254" cy="87" r="2" fill="#1a1a1a"/>
    <circle cx="266" cy="87" r="2" fill="#1a1a1a"/>
    <path d="M254 97 Q260 93 266 97" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="260" y1="106" x2="260" y2="156" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="260" y1="120" x2="232" y2="112" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="260" y1="120" x2="288" y2="112" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="260" y1="156" x2="244" y2="186" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="260" y1="156" x2="276" y2="186" stroke="#1a1a1a" stroke-width="2"/>
    <text x="260" y="208" text-anchor="middle" font-size="10" fill="#888">Engineer</text>

    <!-- Panel 2: Engineer pushes back -->
    <rect x="346" y="20" width="314" height="240" rx="6" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="503" y="40" text-anchor="middle" font-size="10" font-family="monospace" fill="#888" letter-spacing="1">02</text>

    <!-- Engineer (worried) -->
    <circle cx="390" cy="90" r="16" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="384" cy="87" r="2" fill="#1a1a1a"/>
    <circle cx="396" cy="87" r="2" fill="#1a1a1a"/>
    <path d="M384 97 Q390 93 396 97" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="390" y1="106" x2="390" y2="156" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="390" y1="120" x2="362" y2="112" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="390" y1="120" x2="418" y2="112" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="390" y1="156" x2="374" y2="186" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="390" y1="156" x2="406" y2="186" stroke="#1a1a1a" stroke-width="2"/>

    <!-- Engineer bubble -->
    <rect x="414" y="56" width="220" height="42" rx="8" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
    <polygon points="416,74 408,80 422,80" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
    <polygon points="417,74 409,80 423,79" fill="#fff" stroke="#fff" stroke-width="1"/>
    <text x="524" y="74" text-anchor="middle" font-size="11" fill="#1a1a1a">That's 3 weeks of work.</text>
    <text x="524" y="90" text-anchor="middle" font-size="10" fill="#888">Friday is impossible.</text>

    <text x="390" y="208" text-anchor="middle" font-size="10" fill="#888">Engineer</text>

    <!-- PM (surprised) -->
    <circle cx="610" cy="90" r="16" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="604" cy="86" r="2.5" fill="#1a1a1a"/>
    <circle cx="616" cy="86" r="2.5" fill="#1a1a1a"/>
    <ellipse cx="610" cy="96" rx="4" ry="5" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M596 80 L596 72 L610 78 L624 72 L624 80 Z" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="610" y1="106" x2="610" y2="156" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="610" y1="120" x2="588" y2="140" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="610" y1="120" x2="632" y2="140" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="610" y1="156" x2="594" y2="186" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="610" y1="156" x2="626" y2="186" stroke="#1a1a1a" stroke-width="2"/>
    <text x="610" y="208" text-anchor="middle" font-size="10" fill="#888">PM</text>

    <!-- Panel 3: Compromise (full width bottom) -->
    <rect x="20" y="292" width="640" height="240" rx="6" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="340" y="312" text-anchor="middle" font-size="10" font-family="monospace" fill="#888" letter-spacing="1">03</text>

    <!-- PM happy -->
    <circle cx="220" cy="362" r="16" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="214" cy="359" r="2" fill="#1a1a1a"/>
    <circle cx="226" cy="359" r="2" fill="#1a1a1a"/>
    <path d="M214 369 Q220 375 226 369" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M206 352 L206 344 L220 350 L234 344 L234 352 Z" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="220" y1="378" x2="220" y2="428" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="220" y1="392" x2="198" y2="412" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="220" y1="392" x2="242" y2="412" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="220" y1="428" x2="204" y2="458" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="220" y1="428" x2="236" y2="458" stroke="#1a1a1a" stroke-width="2"/>
    <text x="220" y="476" text-anchor="middle" font-size="10" fill="#888">PM</text>

    <!-- Engineer happy -->
    <circle cx="460" cy="362" r="16" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <circle cx="454" cy="359" r="2" fill="#1a1a1a"/>
    <circle cx="466" cy="359" r="2" fill="#1a1a1a"/>
    <path d="M454 369 Q460 375 466 369" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="460" y1="378" x2="460" y2="428" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="460" y1="392" x2="432" y2="412" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="460" y1="392" x2="488" y2="412" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="460" y1="428" x2="444" y2="458" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="460" y1="428" x2="476" y2="458" stroke="#1a1a1a" stroke-width="2"/>
    <text x="460" y="476" text-anchor="middle" font-size="10" fill="#888">Engineer</text>

    <!-- Compromise bubble (inverted, peak moment) -->
    <rect x="256" y="340" width="168" height="42" rx="8" fill="#1a1a1a"/>
    <polygon points="260,370 252,382 268,382" fill="#1a1a1a"/>
    <text x="340" y="358" text-anchor="middle" font-size="11" fill="#fff">Tuesday. Final answer.</text>
    <text x="340" y="374" text-anchor="middle" font-size="10" fill="#aaa">MVP scope, not full feature</text>

    <!-- Handshake arrows -->
    <line x1="242" y1="400" x2="290" y2="400" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="438" y1="400" x2="390" y2="400" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- Caption -->
    <text x="340" y="566" text-anchor="middle" font-size="13" font-weight="500" fill="#1a1a1a">
      Friday demand → 3-week reality → Tuesday compromise
    </text>
  </svg>
</div>
</body>
</html>
