<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>scenepad — api handshake</title>
<style>
  body { margin: 0; padding: 40px 24px; background: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .scene { max-width: 680px; margin: 0 auto; }
  .meta { font-size: 10px; color: #888; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px; font-family: monospace; }
</style>
</head>
<body>
<div class="scene">
  <div class="meta">scenepad / api-handshake</div>
  <svg width="100%" viewBox="0 0 680 400" role="img">
    <title>API handshake sequence diagram</title>
    <desc>Service A requests auth token, auth service returns 401, A retries with refresh token, auth returns 200 OK</desc>
    <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- Actor A -->
    <rect x="87" y="30" width="100" height="36" rx="6" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="137" y="52" text-anchor="middle" font-size="11" font-weight="500" fill="#1a1a1a">Service A</text>
    <line x1="137" y1="66" x2="137" y2="370" stroke="#888" stroke-width="1" stroke-dasharray="4 3"/>

    <!-- Actor Auth -->
    <rect x="493" y="30" width="100" height="36" rx="6" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="543" y="52" text-anchor="middle" font-size="11" font-weight="500" fill="#1a1a1a">Auth API</text>
    <line x1="543" y1="66" x2="543" y2="370" stroke="#888" stroke-width="1" stroke-dasharray="4 3"/>

    <!-- Message 1: POST /token -->
    <line x1="137" y1="120" x2="543" y2="120" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="340" y="113" text-anchor="middle" font-size="10" fill="#1a1a1a">POST /token</text>
    <text x="340" y="135" text-anchor="middle" font-size="9" fill="#888">Authorization: Bearer &lt;expired&gt;</text>

    <!-- Message 2: 401 Unauthorized -->
    <line x1="543" y1="185" x2="137" y2="185" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
    <text x="340" y="178" text-anchor="middle" font-size="10" fill="#1a1a1a">401 Unauthorized</text>
    <text x="340" y="200" text-anchor="middle" font-size="9" fill="#888">token expired</text>

    <!-- Note: retry -->
    <rect x="30" y="208" width="90" height="28" rx="4" fill="#f5f5f5" stroke="#888" stroke-width="0.5" stroke-dasharray="3 2"/>
    <text x="75" y="226" text-anchor="middle" font-size="9" fill="#888">retrying...</text>

    <!-- Message 3: POST /token with refresh -->
    <line x1="137" y1="260" x2="543" y2="260" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="340" y="253" text-anchor="middle" font-size="10" fill="#1a1a1a">POST /token</text>
    <text x="340" y="275" text-anchor="middle" font-size="9" fill="#888">Authorization: Bearer &lt;refresh&gt;</text>

    <!-- Message 4: 200 OK -->
    <line x1="543" y1="325" x2="137" y2="325" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
    <text x="340" y="318" text-anchor="middle" font-size="10" fill="#1a1a1a">200 OK</text>
    <text x="340" y="340" text-anchor="middle" font-size="9" fill="#888">access_token: &lt;new&gt;</text>

    <!-- Caption -->
    <text x="340" y="388" text-anchor="middle" font-size="13" font-weight="500" fill="#1a1a1a">
      Token expired → 401 → retry with refresh → 200 OK
    </text>
  </svg>
</div>
</body>
</html>
